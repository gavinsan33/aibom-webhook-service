# This is a placeholder manifest. The actual ConfigMap should be created using:
#
#   kubectl create configmap aibom-scripts \
#     --from-file=generate_snapshot.py=scripts/aibom-scripts/generate_snapshot.py \
#     --from-file=dataset_detector.py=scripts/aibom-scripts/dataset_detector.py \
#     -n <workload-namespace>
#
# Or use: make create-scripts-configmap NAMESPACE=<workload-namespace>
#
# This ConfigMap must exist in each namespace where instrumented workloads run
# (NOT in aibom-system — pods can only mount ConfigMaps from their own namespace).
