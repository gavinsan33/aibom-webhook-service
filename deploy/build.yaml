apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: aibom-webhook-service
  namespace: aibom-system
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: aibom-webhook-service
  namespace: aibom-system
spec:
  source:
    type: Git
    git:
      uri: https://github.com/gavinsan33/aibom-webhook-service.git
      ref: master
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Dockerfile
  output:
    to:
      kind: ImageStreamTag
      name: aibom-webhook-service:latest
  triggers:
    - type: ConfigChange
